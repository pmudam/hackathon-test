name: RCA Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: false
        default: "create-and-monitor"
        type: choice
        options:
          - create-and-monitor
          - monitor-only
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  rca:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SPLUNK_API_URL: ${{ secrets.SPLUNK_API_URL }}
      SPLUNK_AUTH_TOKEN: ${{ secrets.SPLUNK_AUTH_TOKEN }}
      SPLUNK_DETECTOR_ID: ${{ secrets.SPLUNK_DETECTOR_ID }}
      SPLUNK_DETECTOR_NAME: PIAM-PREVIEW:Test DynamoDB Read Capacity
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      RCA_DEBUG_INCIDENTS: "true"
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install project dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Terraform init
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: make tf-init

      - name: Check if detector exists in Splunk (by name)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        id: check_splunk_detector
        run: |
          set -euo pipefail
          echo "Checking if detector '$SPLUNK_DETECTOR_NAME' exists in Splunk..."

          HTTP_CODE=$(curl -sS -o /tmp/splunk_detectors.json -w "%{http_code}" \
            -H "X-SF-TOKEN: ${SPLUNK_AUTH_TOKEN}" \
            -H "Authorization: Bearer ${SPLUNK_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${SPLUNK_API_URL}/v2/detector?limit=1000")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed to query detectors from Splunk. HTTP status: $HTTP_CODE"
            head -c 400 /tmp/splunk_detectors.json || true
            exit 1
          fi

          DETECTOR_ID=$(python3 -c "import json, pathlib; data=json.loads(pathlib.Path('/tmp/splunk_detectors.json').read_text()); matches=[d.get('id', '') for d in data.get('results', []) if d.get('name') == '$SPLUNK_DETECTOR_NAME']; print(matches[0] if matches else '')")

          if [ -n "$DETECTOR_ID" ]; then
            echo "Found existing detector: $DETECTOR_ID"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "id=$DETECTOR_ID" >> "$GITHUB_OUTPUT"
          else
            echo "No detector found. Will create new one."
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform init
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' && steps.check_splunk_detector.outputs.exists == 'false' }}
        run: make tf-init

      - name: Create Splunk detector via Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' && steps.check_splunk_detector.outputs.exists == 'false' }}
        run: make tf-apply

      - name: Get detector ID after creation or find existing
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          echo "Checking for detector ID..."
          
          if [ "${{ steps.check_splunk_detector.outputs.exists }}" = "true" ]; then
            # Detector already exists — use ID from check step
            DETECTOR_ID="${{ steps.check_splunk_detector.outputs.id }}"
            echo "Using existing detector: $DETECTOR_ID"
          else
            # Detector was just created — get from Terraform
            echo "Reading detector ID from Terraform..."
            cd infra/terraform
            
            # Debug: Show terraform state
            ls -la terraform.tfstate* 2>/dev/null || echo "No terraform state found"
            
            DETECTOR_ID=$(terraform output -raw splunk_detector_id 2>&1 || echo "")
            if [ -z "$DETECTOR_ID" ]; then
              echo "ERROR: Could not get detector ID from Terraform"
              echo "Terraform output:"
              terraform output 2>&1 || true
              exit 1
            fi
            echo "Using newly created detector: $DETECTOR_ID"
            cd - > /dev/null
          fi
          
          echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
          # Save detector ID to repo for future runs
          echo "$DETECTOR_ID" > .detector-id
          echo "Saved detector ID to .detector-id: $DETECTOR_ID"
          cat .detector-id

      - name: Commit detector ID to repo
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          set -euo pipefail
          echo "Current directory: $PWD"
          test -f .detector-id

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .detector-id
          if git diff --cached --quiet; then
            echo "No detector ID changes to commit"
            exit 0
          fi
          git commit -m "Save detector ID: $SPLUNK_DETECTOR_ID"
          git push

      - name: Extract detector ID from Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          DETECTOR_ID="$SPLUNK_DETECTOR_ID"
          echo "detector_id=$DETECTOR_ID" >> "$GITHUB_OUTPUT"
          
          if [ "${{ steps.check_splunk_detector.outputs.exists }}" = "true" ]; then
            STATUS="(Using existing detector)"
          else
            STATUS="(Newly created)"
          fi
          
          {
            echo "## ✅ Detector Ready $STATUS"
            echo ""
            echo "**Detector ID:** \`$DETECTOR_ID\`"
            echo ""
            echo "### What happens next:"
            echo "✅ **No manual steps needed!** Detector is stored in Splunk."
            echo "✅ **Scheduled monitoring starts at midnight UTC every day** — polls every 1 second"
            echo "✅ **Alerts sent to Webex + Email** when triggered"
            echo ""
            echo "### Optional: Store detector ID in GitHub secret for extra safety"
            echo "If you want a backup, you can manually add this to GitHub Secrets:"
            echo "- Go to **Settings → Secrets and variables → Actions**"
            echo "- Create secret **SPLUNK_DETECTOR_ID** with value: \`$DETECTOR_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
        id: detector

      - name: Start monitoring the created detector
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          echo "Detector created. Starting monitoring..."
          echo "SPLUNK_DETECTOR_ID=${{ env.SPLUNK_DETECTOR_ID }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rca-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate required secrets
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          test -n "$SPLUNK_API_URL"     || (echo "ERROR: Missing secret SPLUNK_API_URL"     && exit 1)
          test -n "$SPLUNK_AUTH_TOKEN"  || (echo "ERROR: Missing secret SPLUNK_AUTH_TOKEN"  && exit 1)
          # SPLUNK_DETECTOR_ID can be missing — we'll auto-resolve it below

      - name: Auto-resolve detector ID
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail

          # First, try to read from repo file
          if [ -f ".detector-id" ]; then
            DETECTOR_ID=$(cat .detector-id | tr -d ' \n')
            if [ -n "$DETECTOR_ID" ]; then
              echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
              echo "Found detector ID in repo file: $DETECTOR_ID"
              exit 0
            fi
          fi

          # Check if in GitHub secret
          if [ -n "${SPLUNK_DETECTOR_ID:-}" ]; then
            echo "Using detector from GitHub secret: $SPLUNK_DETECTOR_ID"
            exit 0
          fi

          echo "Detector ID not found. Querying Splunk..."

          HTTP_CODE=$(curl -sS -o /tmp/splunk_detectors.json -w "%{http_code}" \
            -H "X-SF-TOKEN: ${SPLUNK_AUTH_TOKEN}" \
            -H "Authorization: Bearer ${SPLUNK_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "${SPLUNK_API_URL}/v2/detector?limit=1000")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "ERROR: Failed to query detectors from Splunk. HTTP status: $HTTP_CODE"
            head -c 400 /tmp/splunk_detectors.json || true
            exit 1
          fi

          DETECTOR_ID=$(python3 -c "import json, pathlib; data=json.loads(pathlib.Path('/tmp/splunk_detectors.json').read_text()); matches=[d.get('id', '') for d in data.get('results', []) if d.get('name') == '$SPLUNK_DETECTOR_NAME']; print(matches[0] if matches else '')")

          if [ -n "$DETECTOR_ID" ]; then
            echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
            echo "Found detector in Splunk: $DETECTOR_ID"
          else
            echo "ERROR: Could not find detector '$SPLUNK_DETECTOR_NAME' in Splunk"
            echo "Run workflow with action=create-and-monitor to create one, or set SPLUNK_DETECTOR_ID secret."
            exit 1
          fi

      - name: Preflight — check Splunk API connectivity
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail
          INCIDENTS_URL="${SPLUNK_API_URL}/v2/detector/${SPLUNK_DETECTOR_ID}/incidents?limit=1"
          HTTP_CODE=$(curl -sS -o /tmp/splunk_preflight.json -w "%{http_code}" \
            -H "X-SF-TOKEN: ${SPLUNK_AUTH_TOKEN}" \
            -H "Authorization: Bearer ${SPLUNK_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "$INCIDENTS_URL")
          echo "Splunk API preflight status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            case "$HTTP_CODE" in
              401) echo "Hint: 401 — token invalid/expired. Rotate SPLUNK_AUTH_TOKEN secret." ;;
              403) echo "Hint: 403 — token lacks permission to read this detector." ;;
              404) echo "Hint: 404 — detector not found. Check SPLUNK_DETECTOR_ID secret." ;;
              *)   echo "Hint: Unexpected status. Check Splunk service status." ;;
            esac
            head -c 400 /tmp/splunk_preflight.json || true
            exit 1
          fi
          echo "Splunk API reachable. Monitoring detector: $SPLUNK_DETECTOR_ID"

      - name: Run continuous RCA monitor (55 min)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail
          # Polls Splunk detector every 1 second for ~6 hours per job.
          # Scheduled runs restart automatically every 24 hours at midnight UTC — seamless 24/7 monitoring.
          echo "Starting RCA monitor — polling every 1s for ~6 hours..."
          set +e
          timeout 21600s docker run --rm \
            -e SPLUNK_API_URL="$SPLUNK_API_URL" \
            -e SPLUNK_AUTH_TOKEN="$SPLUNK_AUTH_TOKEN" \
            -e SPLUNK_DETECTOR_ID="$SPLUNK_DETECTOR_ID" \
            -e WEBEX_BOT_TOKEN="$WEBEX_BOT_TOKEN" \
            -e WEBEX_ROOM_ID="$WEBEX_ROOM_ID" \
            -e SMTP_SERVER="$SMTP_SERVER" \
            -e SMTP_PORT="$SMTP_PORT" \
            -e SMTP_USER="$SMTP_USER" \
            -e SMTP_PASSWORD="$SMTP_PASSWORD" \
            -e EMAIL_FROM="$EMAIL_FROM" \
            -e EMAIL_TO="$EMAIL_TO" \
            -e RCA_DEBUG_INCIDENTS="$RCA_DEBUG_INCIDENTS" \
            -e RCA_POLL_INTERVAL="1" \
            rca-monitor:latest
          status=$?
          set -e
          if [ "$status" -eq 124 ]; then
            echo "55-minute window complete. Next job starts automatically via cron."
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            echo "Container exited with error code $status"
            exit "$status"
          fi
