name: RCA Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: false
        default: "create-and-monitor"
        type: choice
        options:
          - create-and-monitor
          - monitor-only
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  rca:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SPLUNK_API_URL: ${{ secrets.SPLUNK_API_URL }}
      SPLUNK_AUTH_TOKEN: ${{ secrets.SPLUNK_AUTH_TOKEN }}
      SPLUNK_DETECTOR_ID: ${{ secrets.SPLUNK_DETECTOR_ID }}
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      RCA_DEBUG_INCIDENTS: "true"
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install project dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Terraform init
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: make tf-init

      - name: Create Splunk detector via Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: make tf-apply

      - name: Extract detector ID from Terraform
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          DETECTOR_ID=$(cd infra/terraform && terraform output -raw splunk_detector_id)
          echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
          echo "detector_id=$DETECTOR_ID" >> "$GITHUB_OUTPUT"
          {
            echo "## ✅ Detector Created & Monitoring Started"
            echo ""
            echo "**Detector ID:** \`$DETECTOR_ID\`"
            echo ""
            echo "### What happens next:"
            echo "✅ **No manual steps needed!** The detector ID is automatically stored in Terraform state."
            echo "✅ **Scheduled monitoring starts at midnight UTC every day** — polls every 1 second"
            echo "✅ **Alerts sent to Webex + Email** when triggered"
            echo ""
            echo "### Optional: Store detector ID in GitHub secret for extra safety"
            echo "If you want a backup, you can manually add this to GitHub Secrets:"
            echo "- Go to **Settings → Secrets and variables → Actions**"
            echo "- Create secret **SPLUNK_DETECTOR_ID** with value: \`$DETECTOR_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
        id: detector

      - name: Start monitoring the created detector
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'create-and-monitor' }}
        run: |
          echo "Detector created. Starting monitoring..."
          echo "SPLUNK_DETECTOR_ID=${{ env.SPLUNK_DETECTOR_ID }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rca-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate required secrets
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          test -n "$SPLUNK_API_URL"     || (echo "ERROR: Missing secret SPLUNK_API_URL"     && exit 1)
          test -n "$SPLUNK_AUTH_TOKEN"  || (echo "ERROR: Missing secret SPLUNK_AUTH_TOKEN"  && exit 1)
          # SPLUNK_DETECTOR_ID can be missing — we'll auto-resolve it below

      - name: Auto-resolve detector ID (if not set in secret)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail
          if [ -n "${SPLUNK_DETECTOR_ID:-}" ]; then
            echo "Using detector from secret: $SPLUNK_DETECTOR_ID"
            exit 0
          fi
          
          # Detector ID not in secret — try to find it by Terraform output
          if [ -f "infra/terraform/terraform.tfstate" ]; then
            DETECTOR_ID=$(cd infra/terraform && terraform output -raw splunk_detector_id 2>/dev/null || echo "")
            if [ -n "$DETECTOR_ID" ]; then
              echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
              echo "Auto-resolved detector from Terraform state: $DETECTOR_ID"
              exit 0
            fi
          fi
          
          # Still no detector — fail with clear instructions
          echo "ERROR: SPLUNK_DETECTOR_ID not in GitHub secrets and no Terraform state found."
          echo "Solution: Run workflow with action=create-and-monitor to create and set detector."
          exit 1

      - name: Preflight — check Splunk API connectivity
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail
          INCIDENTS_URL="${SPLUNK_API_URL}/v2/detector/${SPLUNK_DETECTOR_ID}/incidents?limit=1"
          HTTP_CODE=$(curl -sS -o /tmp/splunk_preflight.json -w "%{http_code}" \
            -H "X-SF-TOKEN: ${SPLUNK_AUTH_TOKEN}" \
            -H "Authorization: Bearer ${SPLUNK_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "$INCIDENTS_URL")
          echo "Splunk API preflight status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            case "$HTTP_CODE" in
              401) echo "Hint: 401 — token invalid/expired. Rotate SPLUNK_AUTH_TOKEN secret." ;;
              403) echo "Hint: 403 — token lacks permission to read this detector." ;;
              404) echo "Hint: 404 — detector not found. Check SPLUNK_DETECTOR_ID secret." ;;
              *)   echo "Hint: Unexpected status. Check Splunk service status." ;;
            esac
            head -c 400 /tmp/splunk_preflight.json || true
            exit 1
          fi
          echo "Splunk API reachable. Monitoring detector: $SPLUNK_DETECTOR_ID"

      - name: Run continuous RCA monitor (55 min)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.action == 'monitor-only' }}
        run: |
          set -euo pipefail
          # Polls Splunk detector every 1 second for ~6 hours per job.
          # Scheduled runs restart automatically every 24 hours at midnight UTC — seamless 24/7 monitoring.
          echo "Starting RCA monitor — polling every 1s for ~6 hours..."
          set +e
          timeout 21600s docker run --rm \
            -e SPLUNK_API_URL="$SPLUNK_API_URL" \
            -e SPLUNK_AUTH_TOKEN="$SPLUNK_AUTH_TOKEN" \
            -e SPLUNK_DETECTOR_ID="$SPLUNK_DETECTOR_ID" \
            -e WEBEX_BOT_TOKEN="$WEBEX_BOT_TOKEN" \
            -e WEBEX_ROOM_ID="$WEBEX_ROOM_ID" \
            -e SMTP_SERVER="$SMTP_SERVER" \
            -e SMTP_PORT="$SMTP_PORT" \
            -e SMTP_USER="$SMTP_USER" \
            -e SMTP_PASSWORD="$SMTP_PASSWORD" \
            -e EMAIL_FROM="$EMAIL_FROM" \
            -e EMAIL_TO="$EMAIL_TO" \
            -e RCA_DEBUG_INCIDENTS="$RCA_DEBUG_INCIDENTS" \
            -e RCA_POLL_INTERVAL="1" \
            rca-monitor:latest
          status=$?
          set -e
          if [ "$status" -eq 124 ]; then
            echo "55-minute window complete. Next job starts automatically via cron."
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            echo "Container exited with error code $status"
            exit "$status"
          fi
