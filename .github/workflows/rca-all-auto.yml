name: RCA Demo All Auto (Terraform)

on:
  workflow_dispatch:
    inputs:
      monitor_minutes:
        description: "How long to run continuous monitoring before stopping"
        required: false
        default: "2"
      keep_resources:
        description: "Keep Terraform resources after run (true/false)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  all-auto:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPLUNK_API_URL: ${{ secrets.SPLUNK_API_URL }}
      SPLUNK_AUTH_TOKEN: ${{ secrets.SPLUNK_AUTH_TOKEN }}
      WEBEX_BOT_TOKEN: ${{ secrets.WEBEX_BOT_TOKEN }}
      WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      RCA_POLL_INTERVAL: ${{ secrets.RCA_POLL_INTERVAL }}
      PYTHONPATH: src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate required settings
        run: |
          test -n "$SPLUNK_API_URL" || (echo "Missing secret: SPLUNK_API_URL" && exit 1)
          test -n "$SPLUNK_AUTH_TOKEN" || (echo "Missing secret: SPLUNK_AUTH_TOKEN" && exit 1)

      - name: Terraform init
        run: make tf-init

      - name: Terraform apply
        run: make tf-apply

      - name: Resolve detector ID from Terraform output
        run: |
          set -euo pipefail
          DETECTOR_ID="$(cd infra/terraform && terraform output -raw splunk_detector_id)"
          test -n "$DETECTOR_ID" || (echo "No detector ID from Terraform output" && exit 1)
          echo "SPLUNK_DETECTOR_ID=$DETECTOR_ID" >> "$GITHUB_ENV"
          echo "Resolved detector ID: $DETECTOR_ID"

      - name: Run continuous monitor for bounded time
        env:
          MONITOR_MINUTES: ${{ github.event.inputs.monitor_minutes || '2' }}
        run: |
          set -euo pipefail
          export RCA_POLL_INTERVAL="${RCA_POLL_INTERVAL:-120}"
          echo "Using poll interval: ${RCA_POLL_INTERVAL}s"
          EFFECTIVE_MINUTES=$MONITOR_MINUTES
          if [ "$EFFECTIVE_MINUTES" -lt 2 ]; then
            EFFECTIVE_MINUTES=2
          fi
          DURATION_SECONDS=$((EFFECTIVE_MINUTES * 60))
          START_TS=$(date +%s)
          set +e
          timeout "${DURATION_SECONDS}s" make continuous-rca
          status=$?
          set -e
          END_TS=$(date +%s)
          ELAPSED=$((END_TS - START_TS))
          if [ "$ELAPSED" -lt "$DURATION_SECONDS" ] && [ "$status" -eq 0 ]; then
            REMAINING=$((DURATION_SECONDS - ELAPSED))
            echo "Monitor ended early; waiting ${REMAINING}s to satisfy minimum runtime."
            sleep "$REMAINING"
          fi
          if [ "$status" -eq 124 ]; then
            echo "Monitoring window reached (${EFFECTIVE_MINUTES}m); continuing workflow."
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            echo "continuous-rca failed with exit code $status"
            exit "$status"
          fi

      - name: Destroy Terraform resources
        if: ${{ always() && github.event.inputs.keep_resources != 'true' }}
        run: make tf-destroy

      - name: Keep resources note
        if: ${{ always() && github.event.inputs.keep_resources == 'true' }}
        run: echo "Skipping destroy because keep_resources=true. Use this only when you want to keep the demo detector for the scheduled monitor workflow."
